name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate JSON files
        run: node scripts/validate-json.js

      - name: Validate YAML files
        run: yamllint -c .yamllint.yml settings.yml custom-fields.yml

      - name: Test transform sandbox
        run: node scripts/test-transform.js
