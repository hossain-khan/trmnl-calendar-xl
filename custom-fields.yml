- keyname: "author_info"
  field_type: "author_bio"
  name: "About Calendar XL"
  category: "calendar,productivity"
  github_url: "https://github.com/hossain-khan/trmnl-calendar-xl"
  email_address: "trmnl@hossain.dev"
  description: >-
    Same calendar you know, now in XL — big enough to read from your desk,
    the couch, or across the room. See what's happening NOW, what's up NEXT,
    and a peek at what's LATER. No squinting required.
    Requires a native Google Calendar plugin connected via Plugin Merge.

- keyname: "calendar_source"
  field_type: "plugin_instance_select"
  name: "Calendar Source"
  plugin_keyname: "google_calendar"
  description: "Choose the Google Calendar that provides your primary calendar events."
  help_text: "Add a <b>Google Calendar</b> plugin to a playlist first (you can hide it to save a screen slot). It will then appear here."

- keyname: "capitalize_text"
  field_type: "boolean"
  name: "Capitalize Event Text"
  description: "Display event names in ALL CAPS"
  optional: true
  default: false

- keyname: "demo_mode"
  field_type: "boolean"
  name: "Demo Mode"
  description: "ON by default. Shows sample events to protect personal data in the public preview. <br> ⏻ <b>Turn OFF</b> once your calendar is connected."
  optional: true
  default: true
