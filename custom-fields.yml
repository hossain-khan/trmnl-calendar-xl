- keyname: "calendar_source"
  field_type: "plugin_instance_select"
  name: "Calendar Source"
  plugin_keyname: "google_calendar"
  description: "Select the Google Calendar plugin instance to merge events from"
  help_text: "Only Google Calendar plugins active in a playlist are shown. Hide the native plugin in your playlist to use it here."

- keyname: "max_later_items"
  field_type: "select"
  name: "Later Items"
  optional: true
  default: 3
  options:
    - "2 items": 2
    - "3 items": 3
    - "4 items": 4
  description: "Maximum number of future events shown in the LATER section (full layout only)"

- keyname: "custom_title"
  field_type: "string"
  name: "Custom Plugin Title"
  placeholder: "Calendar XL"
  optional: true
  description: "Overrides the title bar; leave blank to use the TRMNL instance name"
